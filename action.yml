name: AIVA batch test run
description: Start an AIVA test batch via POST /v1/batches (see https://app.aiva.works/docs/api/batches-run-batch)

inputs:
  api-key:
    description: AIVA API key (store in a repository or organization secret)
    required: true
  labels:
    description: Semicolon-separated labels used to select tests for the batch (e.g. "smoke,regression")
    required: true

runs:
  using: node24
  main: dist/index.js
