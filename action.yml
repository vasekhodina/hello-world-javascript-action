name: AIVA batch test run
description: Start an AIVA test batch via POST /v1/batches (see https://app.aiva.works/docs/api/batches-run-batch)

inputs:
  api-key:
    description: AIVA API key (store in a repository or organization secret)
    required: true
  labels:
    description: Comma-separated labels used to select tests for the batch (e.g. "smoke,regression")
    required: true
  api-url:
    description: >
      Full URL of POST /v1/batches. Do not use app.aiva.works — that is the web UI and returns HTML 404 for API paths.
      Use your AIVA API host (often https://api.aiva.works/v1/batches or the URL from your tenant).
    required: false
    default: https://api.aiva.works/v1/batches
  auth-header:
    description: How to send the API key — bearer (Authorization Bearer) or x-api-key (X-API-Key header)
    required: false
    default: bearer

outputs:
  status-code:
    description: HTTP status from the AIVA API (202 when the batch was accepted)
  response-body:
    description: Response body from the API (JSON text)

runs:
  using: node24
  main: dist/index.js
