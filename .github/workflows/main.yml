name: Run AIVA Test Batch

on:
  workflow_dispatch:
    inputs:
      LABELS:
        description: "Label of the tests that should be run"
        type: string
        default: "" 
      MAX_NUMBER_OF_AGENTS:
        description: "Maximum number of AIVA agents that can be used for running tests"
        type: number
        default: "" 
      TEST_NAME:
        description: "Optional name for the test batch"
        type: string
        default: "" 
      GLOBAL_OVERRIDES: 
        description: "Overrides variables in all tests"
        type: string
        default: "" 
      OVERRIDES_PER_TEST: 
        description: "Overrides variables in test specifid by test ID"
        type: string
        default: "" 
      GATEWAY_NAME: 
        description: "Uses a specified gateway during batch run"
        type: string
        default: "" 

jobs:
  aiva_batch_job:
    name: Run AIVA batch (example)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout aiva-actions/run repo
        id: checkout
        uses: actions/checkout@v6
        with:
          repository: aiva-actions/run

      - name: Start AIVA batch
        id: aiva
        uses: aiva-actions/run@initial-customization
        with:
          apiKey: ${{ secrets.APIKEY }}
          labels: ${{ inputs.LABELS}}
          maxNumberOfAgents: ${{ inputs.MAX_NUMBER_OF_AGENTS }}
          testName: ${{ inputs.TEST_NAME }}
          globalVariableOverrides: ${{ inputs.GLOBAL_OVERRIDES }}
          variableOverridesPerTest: ${{ inputs.OVERRIDES_PER_TEST }}
          gatewayName: ${{ inputs.GATEWAY_NAME }}

      - name: Generate CTRF summary
        id: summary
        uses: ctrf-io/github-test-reporter@v1.0.28
        with:
          report-path: 'batch-ctrf.json'
          template-path: 'summary-template.hbs'
        if: always()
