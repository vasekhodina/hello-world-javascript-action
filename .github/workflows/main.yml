on:
  workflow_dispatch:
    inputs:
      AIVA_API_KEY:
        description: "API Key for your account from AIVA"
        type: string
        default: ""
      LABELS:
        description: "Label of the tests that should be run"
        type: string
        default: "" 

jobs:
  aiva_batch_job:
    name: Run AIVA batch (example)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start AIVA batch
        id: aiva
        uses: ./
        with:
          api-key: ${{ inputs.AIVA_API_KEY }}
          labels: ${{ inputs.LABELS}}

      - name: Show API response
        run: |
          echo "HTTP status: ${{ steps.aiva.outputs.status-code }}"
          echo "Body: ${{ steps.aiva.outputs.response-body }}"
