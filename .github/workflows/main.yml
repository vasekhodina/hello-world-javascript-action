name: Run AIVA Test Batch

on:
  workflow_dispatch:
    inputs:
      AIVA_API_KEY:
        description: "API Key for your account from AIVA"
        type: string
        default: ""
      LABELS:
        description: "Label of the tests that should be run"
        type: string
        default: "" 

jobs:
  aiva_batch_job:
    name: Run AIVA batch (example)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start AIVA batch
        id: aiva
        uses: aiva-actions/run
        with:
          apiKey: ${{ inputs.AIVA_API_KEY }}
          labels: ${{ inputs.LABELS}}
          maxNumberOfAgents: ${{ inputs.MAX_NUMBER_OF_AGENTS }}
          testName: ${{ inputs.TEST_NAME }}
          globalVariableOverrides: ${{ inputs.GLOBAL_OVERRIDES }}
          variableOverridesPerTest: ${{ inputs.OVERRIDES_PER_TEST }}
          gatewayName: ${{ inputs.GATEWAY_NAME }}
          

      - name: Show API response
        run: |
          echo "HTTP status: ${{ steps.aiva.outputs.status-code }}"
          echo "Body: ${{ steps.aiva.outputs.response-body }}"
